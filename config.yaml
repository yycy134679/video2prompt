# 火山方舟 Responses / Files 配置
volcengine:
  # 火山方舟 API 基础地址
  base_url: "https://ark.cn-beijing.volces.com/api/v3"
  # 推理接入点 ID
  endpoint_id: "ep-m-20260227145730-85ww4"
  # 火山请求超时时间（秒）
  timeout_seconds: 300
  # 视频采样帧率（video_url 模式有效，范围 0.2-5）
  video_fps: 2.0
  # 思考模式（enabled/disabled/auto）
  thinking_type: "enabled"
  # 思考强度（minimal/low/medium/high）
  reasoning_effort: "medium"
  # 最大输出 token 数（null 表示不显式下发）
  max_output_tokens: null
  # 输入模式（auto/video_url/file_id）
  input_mode: "auto"
  # video_url 模式视频上限（MB，文档硬上限 50）
  video_url_size_limit_mb: 50
  # Files API 视频上限（MB，文档上限 512）
  files_video_size_limit_mb: 512
  # 上传文件过期天数（1-30）
  files_expire_days: 7
  # 文件激活轮询超时时间（秒）
  files_poll_timeout_seconds: 180
  # 是否开启流式 Responses 聚合
  stream: true

# 抖音解析配置
parser:
  # 兼容保留字段：当前版本不再依赖外部 HTTP 解析服务，读取但忽略
  base_url: "http://localhost:80"
  # 并发解析任务数（建议 1-5）
  concurrency: 3
  # 每次解析完成后，槽位冷却最小秒数
  pre_delay_min_seconds: 3.0
  # 每次解析完成后，槽位冷却最大秒数
  pre_delay_max_seconds: 3.0
  # 解析请求超时时间（秒）
  timeout_seconds: 30

# 重试与退避配置
retry:
  # Parser 重试等待序列（秒）
  parser_backoff_seconds: [10, 30]
  # 模型重试等待序列（秒）
  model_backoff_seconds: [5, 15]
  # Parser 最大退避上限（秒）
  parser_backoff_cap_seconds: 30
  # 模型最大退避上限（秒）
  model_backoff_cap_seconds: 30
  # 兼容保留字段（当前版本调度器不再使用）
  pause_global_queue_during_backoff: true

# 熔断器配置
circuit_breaker:
  # 失败率统计窗口（秒）
  window_seconds: 300
  # Parser 熔断阈值
  parser:
    # 连续失败次数阈值
    consecutive_failures: 4
    # 窗口失败率阈值（0-1）
    failure_rate: 0.6
  # 模型熔断阈值
  model:
    # 连续失败次数阈值
    consecutive_failures: 4
    # 窗口失败率阈值（0-1）
    failure_rate: 0.5

# 单任务尾部延时配置
task:
  # 任务完成后随机等待最小秒数
  completion_delay_min_seconds: 2.0
  # 任务完成后随机等待最大秒数
  completion_delay_max_seconds: 3.0

# 缓存配置
cache:
  # SQLite 缓存数据库路径
  db_path: "data/cache.db"
  # 缓存键是否包含提示词哈希
  include_prompt_hash_in_key: true

# 日志配置
logging:
  # 日志文件路径
  file_path: "logs/app.log"
  # 日志级别（DEBUG/INFO/WARNING/ERROR/CRITICAL）
  level: "INFO"
  # 日志保留天数（按自然日滚动）
  retention_days: 7
